  <text x="331" y="53" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">オブジェクト</text>

  <!-- Arrow -->
  <line x1="386" y1="40" x2="406" y2="40" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ld -->
  <rect x="414" y="15" width="100" height="50" rx="4" ry="4"
