  <text x="198" y="53" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">アセンブラ</text>

  <!-- Arrow -->
  <line x1="248" y1="40" x2="268" y2="40" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- hello.o -->
