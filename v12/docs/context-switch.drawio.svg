<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 550 150" width="550" height="150"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Task A registers -->
  <rect x="10" y="10" width="140" height="100" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="80" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">Task A</text>
  <text x="24" y="50" font-family="sans-serif" font-size="11" fill="#333">RIP = 0x401000</text>
  <text x="24" y="68" font-family="sans-serif" font-size="11" fill="#333">RSP = 0x7000</text>
  <text x="24" y="86" font-family="sans-serif" font-size="11" fill="#333">RAX, RBX, ...</text>

  <!-- Arrow: save (Task A -> Scheduler) -->
  <line x1="150" y1="45" x2="200" y2="45" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="175" y="38" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">save</text>

  <!-- Scheduler box -->
  <rect x="205" y="20" width="140" height="70" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="275" y="47" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">Scheduler</text>
  <text x="275" y="67" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">swapcontext</text>
  <text x="275" y="82" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">(&amp;A.ctx, &amp;B.ctx)</text>

  <!-- Arrow: restore (Scheduler -> Task B) -->
  <line x1="345" y1="45" x2="395" y2="45" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="370" y="38" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">restore</text>

  <!-- Task B registers -->
  <rect x="400" y="10" width="140" height="100" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="470" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">Task B</text>
  <text x="414" y="50" font-family="sans-serif" font-size="11" fill="#333">RIP = 0x502000</text>
  <text x="414" y="68" font-family="sans-serif" font-size="11" fill="#333">RSP = 0x8000</text>
  <text x="414" y="86" font-family="sans-serif" font-size="11" fill="#333">RAX, RBX, ...</text>

  <!-- Bottom label -->
  <text x="275" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">全レジスタとスタックを一括で切り替え</text>
</svg>
