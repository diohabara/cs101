<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 500 200" width="500" height="200"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Left box: Assembly -->
  <rect x="10" y="10" width="180" height="140" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="100" y="32" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">Assembly (v1-v8)</text>
  <text x="24" y="58" font-family="sans-serif" font-size="11" fill="#333">mov [rax], 42</text>
  <text x="24" y="80" font-family="sans-serif" font-size="11" fill="#333">lea rax, [x]</text>
  <text x="24" y="102" font-family="sans-serif" font-size="11" fill="#333">or flags, FLAG</text>
  <text x="24" y="124" font-family="sans-serif" font-size="11" fill="#333">syscall</text>

  <!-- Arrows -->
  <line x1="195" y1="55" x2="295" y2="55" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="195" y1="77" x2="295" y2="77" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="195" y1="99" x2="295" y2="99" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="195" y1="121" x2="295" y2="121" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Right box: C -->
  <rect x="300" y="10" width="190" height="140" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="395" y="32" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">C (v9~)</text>
  <text x="314" y="58" font-family="sans-serif" font-size="11" fill="#333">*ptr = 42;</text>
  <text x="314" y="80" font-family="sans-serif" font-size="11" fill="#333">ptr = &amp;x;</text>
  <text x="314" y="102" font-family="sans-serif" font-size="11" fill="#333">flags |= FLAG;</text>
  <text x="314" y="124" font-family="sans-serif" font-size="11" fill="#333">write(), mmap()</text>

  <!-- Labels -->
  <text x="100" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">ハードウェア直接操作</text>
  <text x="395" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">薄い抽象化レイヤー</text>
</svg>
