<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 500 200" width="500" height="200"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Labels -->
  <text x="50" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">Order</text>
  <text x="290" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">Memory Blocks</text>

  <!-- Order 2: 16KB full block -->
  <text x="50" y="55" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">2 (16KB)</text>
  <rect x="100" y="35" width="360" height="35" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="280" y="57" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">16KB block</text>

  <!-- Split arrow -->
  <text x="50" y="87" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">split</text>
  <line x1="70" y1="70" x2="70" y2="90" stroke="#aaa" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Order 1: two 8KB blocks -->
  <text x="50" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">1 (8KB)</text>
  <rect x="100" y="95" width="175" height="35" rx="3" ry="3"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="187" y="117" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Buddy A</text>
  <rect x="285" y="95" width="175" height="35" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="372" y="117" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Buddy B</text>
  <text x="372" y="125" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">(free list)</text>

  <!-- Split arrow -->
  <text x="50" y="147" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">split</text>
  <line x1="70" y1="130" x2="70" y2="150" stroke="#aaa" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Order 0: two 4KB blocks from Buddy A, Buddy B stays -->
  <text x="50" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">0 (4KB)</text>
  <rect x="100" y="155" width="83" height="35" rx="3" ry="3"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="141" y="177" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">A.0</text>
  <text x="141" y="186" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#888">allocated</text>
  <rect x="192" y="155" width="83" height="35" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="233" y="177" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">A.1</text>
  <text x="233" y="186" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#888">(free list)</text>
  <rect x="285" y="155" width="175" height="35" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="372" y="177" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Buddy B</text>
</svg>
