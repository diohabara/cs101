<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 560 80" width="560" height="80"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- CPU が出すアドレス -->
  <rect x="10" y="15" width="160" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="90" y="37" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">CPU が出すアドレス</text>
  <text x="90" y="53" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">(仮想アドレス)</text>

  <!-- Arrow -->
  <line x1="170" y1="40" x2="200" y2="40" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- MMU -->
  <rect x="208" y="15" width="140" height="50" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="278" y="37" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">MMU</text>
  <text x="278" y="53" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">+ ページテーブル</text>

  <!-- Arrow -->
  <line x1="348" y1="40" x2="378" y2="40" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 物理メモリ -->
  <rect x="386" y="15" width="160" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="466" y="45" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">物理メモリ</text>
</svg>
