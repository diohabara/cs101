<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 440 240" width="440" height="240"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Participant headers -->
  <rect x="20" y="10" width="100" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="70" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">プロセス</text>

  <rect x="180" y="10" width="100" height="30" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="230" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">カーネル</text>

  <rect x="340" y="10" width="80" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="380" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">MMU</text>

  <!-- Lifelines -->
  <line x1="70" y1="40" x2="70" y2="230" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="230" y1="40" x2="230" y2="230" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="380" y1="40" x2="380" y2="230" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- mov rbx, [r12] -->
  <line x1="70" y1="70" x2="380" y2="70" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="225" y="63" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">mov rbx, [r12] (PROT_NONE のページ)</text>

  <!-- ページフォルト例外 -->
  <line x1="380" y1="110" x2="230" y2="110" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="305" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">ページフォルト例外</text>

  <!-- SIGSEGV -->
  <line x1="230" y1="150" x2="70" y2="150" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="150" y="143" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">SIGSEGV (signal 11)</text>

  <!-- Note: 終了コード 139 -->
  <rect x="20" y="180" width="130" height="30" rx="4" ry="4"
        fill="#f0f4f8" stroke="#5a6a7a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="85" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">終了コード 139</text>
</svg>
