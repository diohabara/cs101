<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 250" width="400" height="250"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="80" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">Host</text>
  <text x="300" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">Guest</text>

  <!-- Host timeline -->
  <line x1="80" y1="30" x2="80" y2="230" stroke="#5a6a7a" stroke-width="1.5"/>
  <!-- Guest timeline -->
  <line x1="300" y1="30" x2="300" y2="230" stroke="#5a6a7a" stroke-width="1.5"/>

  <!-- vmlaunch arrow -->
  <line x1="80" y1="55" x2="295" y2="75" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="185" y="52" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">vmlaunch</text>

  <!-- Guest: mov rax, 0x42 -->
  <rect x="220" y="85" width="160" height="22" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1"/>
  <text x="300" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">mov rax, 0x42</text>

  <!-- Guest: hlt -->
  <rect x="220" y="115" width="160" height="22" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1"/>
  <text x="300" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">hlt</text>

  <!-- VM exit arrow -->
  <line x1="295" y1="140" x2="85" y2="160" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="185" y="155" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">VM exit (HLT)</text>

  <!-- Host: read guest RAX -->
  <rect x="10" y="170" width="140" height="22" rx="3" ry="3"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1"/>
  <text x="80" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#333">read guest RAX=0x42</text>

  <!-- Host: handle exit -->
  <rect x="10" y="200" width="140" height="22" rx="3" ry="3"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1"/>
  <text x="80" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#333">handle exit</text>
</svg>
