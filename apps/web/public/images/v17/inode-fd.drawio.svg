<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 550 220" width="550" height="220"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- fd table title -->
  <text x="65" y="18" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">fd table</text>

  <!-- fd 0 -->
  <rect x="20" y="25" width="90" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="40" y="45" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">0</text>
  <text x="85" y="45" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">stdin</text>

  <!-- fd 1 -->
  <rect x="20" y="60" width="90" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="40" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">1</text>
  <text x="85" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">stdout</text>

  <!-- fd 2 -->
  <rect x="20" y="95" width="90" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="40" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">2</text>
  <text x="85" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">stderr</text>

  <!-- fd 3 -->
  <rect x="20" y="130" width="90" height="30" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="40" y="150" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">3</text>
  <text x="85" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">(file)</text>

  <!-- inode table title -->
  <text x="280" y="18" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">inode table</text>

  <!-- inode 0 -->
  <rect x="210" y="25" width="140" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="280" y="45" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">inode 0 (root)</text>

  <!-- inode 1 -->
  <rect x="210" y="60" width="140" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="280" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">inode 1 (hello)</text>

  <!-- inode 2 -->
  <rect x="210" y="95" width="140" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="280" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">inode 2 (test)</text>

  <!-- inode for fd 3 -->
  <rect x="210" y="130" width="140" height="30" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="280" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">inode 3 (file)</text>

  <!-- Arrow: fd 3 -> inode 3 -->
  <line x1="110" y1="145" x2="208" y2="145" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- data blocks title -->
  <text x="470" y="18" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">data</text>

  <!-- data: root -->
  <rect x="410" y="25" width="120" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="470" y="45" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">/</text>

  <!-- data: hello -->
  <rect x="410" y="60" width="120" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="470" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">Hello, World!</text>

  <!-- data: test -->
  <rect x="410" y="95" width="120" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="470" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">(empty)</text>

  <!-- data: file -->
  <rect x="410" y="130" width="120" height="30" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="470" y="150" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">...</text>

  <!-- Arrows: inode -> data -->
  <line x1="350" y1="40" x2="408" y2="40" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="75" x2="408" y2="75" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="110" x2="408" y2="110" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="145" x2="408" y2="145" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <text x="275" y="195" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">fd (integer) &#x2192; inode (metadata) &#x2192; data (content)</text>
</svg>
