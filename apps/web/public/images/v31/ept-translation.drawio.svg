<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 550 200" width="550" height="200"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="60" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">Guest Process</text>
  <text x="230" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">Guest OS</text>
  <text x="430" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">Hypervisor</text>

  <!-- GVA -->
  <rect x="20" y="28" width="80" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="60" y="48" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">GVA</text>

  <!-- Arrow: page table -->
  <line x1="100" y1="43" x2="175" y2="43" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="137" y="38" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">page table</text>

  <!-- GPA -->
  <rect x="183" y="28" width="90" height="30" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="228" y="48" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">GPA</text>

  <!-- Arrow: EPT -->
  <line x1="273" y1="43" x2="365" y2="43" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="319" y="38" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">EPT</text>

  <!-- HPA -->
  <rect x="373" y="28" width="90" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="418" y="48" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">HPA</text>

  <!-- Labels -->
  <text x="228" y="75" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">"fake phys"</text>
  <text x="418" y="75" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">"real phys"</text>

  <!-- Isolation example: Guest A -->
  <rect x="20" y="100" width="200" height="28" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1"/>
  <text x="120" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">Guest A: GPA 0x1000</text>
  <line x1="220" y1="114" x2="305" y2="114" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <text x="262" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">EPT A</text>
  <rect x="313" y="100" width="200" height="28" rx="3" ry="3"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1"/>
  <text x="413" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">HPA 0x300000</text>

  <!-- Isolation example: Guest B -->
  <rect x="20" y="138" width="200" height="28" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1"/>
  <text x="120" y="156" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">Guest B: GPA 0x1000</text>
  <line x1="220" y1="152" x2="305" y2="152" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <text x="262" y="146" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">EPT B</text>
  <rect x="313" y="138" width="200" height="28" rx="3" ry="3"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1"/>
  <text x="413" y="156" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">HPA 0x400000</text>

  <!-- Isolated annotation -->
  <text x="413" y="184" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">(isolated!)</text>
</svg>
