<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 120" width="600" height="120"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Step labels -->
  <text x="75" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">1. CPU writes desc</text>
  <text x="270" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">2. DMA engine copies</text>
  <text x="470" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">3. Interrupt</text>

  <!-- CPU left -->
  <rect x="15" y="25" width="100" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="65" y="55" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">CPU</text>

  <!-- Arrow: desc -->
  <line x1="115" y1="50" x2="190" y2="50" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="152" y="44" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">desc</text>

  <!-- DMA Ring -->
  <rect x="198" y="25" width="120" height="50" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="258" y="55" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">DMA Ring</text>

  <!-- Arrow: data -->
  <line x1="318" y1="50" x2="378" y2="50" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="348" y="44" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">data</text>

  <!-- Memory -->
  <rect x="386" y="25" width="100" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="436" y="55" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">Memory</text>

  <!-- Arrow: IRQ -->
  <line x1="486" y1="50" x2="540" y2="50" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="513" y="44" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">IRQ</text>

  <!-- CPU right -->
  <rect x="548" y="25" width="42" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="569" y="55" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">CPU</text>

  <!-- Bottom annotation -->
  <text x="300" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">CPU はデスクリプタを投入するだけ。転送は DMA エンジンが自律的に実行</text>
</svg>
