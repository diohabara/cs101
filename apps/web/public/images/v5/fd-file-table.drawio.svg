<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 560 250" width="560" height="250"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- sys_write box -->
  <rect x="15" y="10" width="230" height="42" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="130" y="36" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sys_write(fd=1, buf, count)</text>

  <!-- Arrow down to file table -->
  <line x1="130" y1="52" x2="130" y2="78" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="170" y="70" font-family="sans-serif" font-size="10" fill="#888">syscall</text>

  <!-- カーネルのファイルテーブル -->
  <rect x="15" y="86" width="240" height="150" rx="4" ry="4"
        fill="#f0f4f8" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="135" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">カーネルのファイルテーブル</text>

  <!-- fd 0 -->
  <rect x="35" y="118" width="150" height="30" rx="4" ry="4"
        fill="#f0f4f8" stroke="#5a6a7a" stroke-width="1"/>
  <text x="110" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">fd 0 — stdin</text>

  <!-- fd 1 (highlighted) -->
  <rect x="35" y="155" width="150" height="30" rx="4" ry="4"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="110" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">fd 1 — stdout</text>

  <!-- fd 2 -->
  <rect x="35" y="192" width="150" height="30" rx="4" ry="4"
        fill="#f0f4f8" stroke="#5a6a7a" stroke-width="1"/>
  <text x="110" y="212" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">fd 2 — stderr</text>

  <!-- Dashed arrow fd1 → 端末 -->
  <line x1="185" y1="170" x2="350" y2="170" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>

  <!-- 端末 -->
  <rect x="358" y="148" width="180" height="46" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="448" y="168" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">端末（出力側）</text>
  <text x="448" y="184" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">ここに write される</text>
</svg>
