<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 620 420" width="620" height="420"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Participant headers -->
  <rect x="10" y="10" width="120" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="70" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">_start</text>

  <rect x="170" y="10" width="120" height="30" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="230" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">スタック</text>

  <rect x="330" y="10" width="130" height="30" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="395" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">double_add_five</text>

  <rect x="500" y="10" width="100" height="30" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="550" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">add_five</text>

  <!-- Lifelines -->
  <line x1="70" y1="40" x2="70" y2="410" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="230" y1="40" x2="230" y2="410" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="395" y1="40" x2="395" y2="410" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="550" y1="40" x2="550" y2="410" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 1. _start → Stack: push 戻りアドレス A -->
  <line x1="70" y1="65" x2="230" y2="65" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="150" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">push 戻りアドレス A</text>

  <!-- 2. _start → double_add_five: call -->
  <line x1="70" y1="90" x2="395" y2="90" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="232" y="85" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">call double_add_five</text>

  <!-- 3. double → Stack: push 戻りアドレス B -->
  <line x1="395" y1="120" x2="230" y2="120" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="312" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">push 戻りアドレス B</text>

  <!-- 4. double → add_five: call (1回目) -->
  <line x1="395" y1="150" x2="550" y2="150" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="472" y="145" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">call add_five (1回目)</text>

  <!-- 5. add_five → Stack: pop 戻りアドレス B -->
  <line x1="550" y1="190" x2="230" y2="190" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="390" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">pop 戻りアドレス B</text>

  <!-- 6. add_five → double: ret -->
  <line x1="550" y1="220" x2="395" y2="220" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="472" y="215" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">ret</text>

  <!-- 7. double → Stack: push 戻りアドレス C -->
  <line x1="395" y1="255" x2="230" y2="255" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="312" y="250" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">push 戻りアドレス C</text>

  <!-- 8. double → add_five: call (2回目) -->
  <line x1="395" y1="285" x2="550" y2="285" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="472" y="280" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">call add_five (2回目)</text>

  <!-- 9. add_five → Stack: pop 戻りアドレス C -->
  <line x1="550" y1="320" x2="230" y2="320" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="390" y="315" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">pop 戻りアドレス C</text>

  <!-- 10. add_five → double: ret -->
  <line x1="550" y1="345" x2="395" y2="345" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="472" y="340" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">ret</text>

  <!-- 11. double → Stack: pop 戻りアドレス A -->
  <line x1="395" y1="375" x2="230" y2="375" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="312" y="370" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">pop 戻りアドレス A</text>

  <!-- 12. double → _start: ret -->
  <line x1="395" y1="400" x2="70" y2="400" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="232" y="395" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">ret</text>
</svg>
