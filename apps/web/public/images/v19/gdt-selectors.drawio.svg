<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 350 250" width="350" height="250"
     style="background: transparent;">

  <!-- Title -->
  <text x="175" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold">GDT</text>

  <!-- Null descriptor -->
  <rect x="50" y="35" width="250" height="35" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="65" y="57" font-family="sans-serif" font-size="11" fill="#888">0x00</text>
  <text x="175" y="57" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">null descriptor</text>

  <!-- Kernel Code -->
  <rect x="50" y="75" width="250" height="35" rx="3" ry="3"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="65" y="97" font-family="sans-serif" font-size="11" fill="#888">0x08</text>
  <text x="185" y="97" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Kernel Code</text>
  <text x="285" y="97" text-anchor="end" font-family="sans-serif" font-size="11" fill="#888">Ring 0</text>

  <!-- Kernel Data -->
  <rect x="50" y="115" width="250" height="35" rx="3" ry="3"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="65" y="137" font-family="sans-serif" font-size="11" fill="#888">0x10</text>
  <text x="185" y="137" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Kernel Data</text>
  <text x="285" y="137" text-anchor="end" font-family="sans-serif" font-size="11" fill="#888">Ring 0</text>

  <!-- User Code -->
  <rect x="50" y="155" width="250" height="35" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="65" y="177" font-family="sans-serif" font-size="11" fill="#888">0x18</text>
  <text x="185" y="177" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">User Code</text>
  <text x="285" y="177" text-anchor="end" font-family="sans-serif" font-size="11" fill="#888">Ring 3</text>

  <!-- User Data -->
  <rect x="50" y="195" width="250" height="35" rx="3" ry="3"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="65" y="217" font-family="sans-serif" font-size="11" fill="#888">0x20</text>
  <text x="185" y="217" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">User Data</text>
  <text x="285" y="217" text-anchor="end" font-family="sans-serif" font-size="11" fill="#888">Ring 3</text>

  <!-- Selector formula -->
  <text x="175" y="245" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">selector = index * 8</text>
</svg>
