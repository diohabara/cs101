<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 700 100" width="700" height="100"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Fetch -->
  <rect x="10" y="20" width="140" height="60" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="80" y="42" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">Fetch</text>
  <text x="80" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">RIP のアドレスから</text>
  <text x="80" y="74" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">命令を読む</text>

  <!-- Arrow F→D -->
  <line x1="150" y1="50" x2="170" y2="50" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Decode -->
  <rect x="178" y="20" width="140" height="60" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="248" y="42" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">Decode</text>
  <text x="248" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">命令の種類と</text>
  <text x="248" y="74" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">オペランドを解析</text>

  <!-- Arrow D→E -->
  <line x1="318" y1="50" x2="338" y2="50" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Execute -->
  <rect x="346" y="20" width="140" height="60" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="416" y="42" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">Execute</text>
  <text x="416" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">命令を実行し</text>
  <text x="416" y="74" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">状態を更新</text>

  <!-- Arrow E→U -->
  <line x1="486" y1="50" x2="506" y2="50" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Update RIP -->
  <rect x="514" y="20" width="140" height="60" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="584" y="42" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">Update RIP</text>
  <text x="584" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">次の命令を指す</text>

  <!-- Loop arrow: Update RIP → Fetch (curved path below) -->
  <path d="M 584 80 L 584 95 Q 584 100 579 100 L 85 100 Q 80 100 80 95 L 80 80"
        fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
</svg>
