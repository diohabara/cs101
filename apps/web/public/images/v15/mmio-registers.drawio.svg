<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 450 250" width="450" height="250"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- CPU box -->
  <rect x="20" y="85" width="110" height="50" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="75" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold">CPU</text>

  <!-- Arrow: CPU -> Memory Map -->
  <line x1="130" y1="110" x2="195" y2="110" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="163" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">load/</text>
  <text x="163" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">store</text>

  <!-- Memory Map title -->
  <text x="320" y="25" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">Memory Map</text>

  <!-- COMMAND register -->
  <rect x="205" y="40" width="230" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="260" y="63" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">COMMAND</text>
  <text x="260" y="80" text-anchor="start" font-family="sans-serif" font-size="11" fill="#888">(write)</text>
  <text x="215" y="63" text-anchor="start" font-family="monospace" font-size="10" fill="#888">0x00</text>

  <!-- STATUS register -->
  <rect x="205" y="95" width="230" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="260" y="118" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">STATUS</text>
  <text x="260" y="135" text-anchor="start" font-family="sans-serif" font-size="11" fill="#888">(read)</text>
  <text x="215" y="118" text-anchor="start" font-family="monospace" font-size="10" fill="#888">0x04</text>

  <!-- DATA register -->
  <rect x="205" y="150" width="230" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="260" y="173" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">DATA</text>
  <text x="260" y="190" text-anchor="start" font-family="sans-serif" font-size="11" fill="#888">(read/write)</text>
  <text x="215" y="173" text-anchor="start" font-family="monospace" font-size="10" fill="#888">0x08</text>

  <!-- Direction arrows on registers -->
  <text x="400" y="68" text-anchor="end" font-family="sans-serif" font-size="18" fill="#aaa">&#x2190;</text>
  <text x="400" y="123" text-anchor="end" font-family="sans-serif" font-size="18" fill="#aaa">&#x2192;</text>
  <text x="400" y="178" text-anchor="end" font-family="sans-serif" font-size="18" fill="#aaa">&#x2194;</text>

  <!-- Base address note -->
  <text x="320" y="225" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">base address + offset</text>
</svg>
