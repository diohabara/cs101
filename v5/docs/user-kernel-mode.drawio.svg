<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 320 180" width="320" height="180"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- ユーザーモード -->
  <rect x="50" y="20" width="200" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="150" y="42" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold">ユーザーモード</text>
  <text x="150" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">（Ring 3）</text>

  <!-- カーネルモード -->
  <rect x="50" y="110" width="200" height="50" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="150" y="132" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold">カーネルモード</text>
  <text x="150" y="148" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">（Ring 0）</text>

  <!-- syscall arrow (down, left side) -->
  <line x1="115" y1="70" x2="115" y2="110" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="100" y="95" text-anchor="end" font-family="sans-serif" font-size="12" fill="#888">syscall</text>

  <!-- sysret arrow (up, right side) -->
  <line x1="185" y1="110" x2="185" y2="70" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="200" y="95" font-family="sans-serif" font-size="12" fill="#888">sysret</text>
</svg>
