<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 550 80" width="550" height="80"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- CPU -->
  <rect x="5" y="15" width="100" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="55" y="37" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">CPU</text>
  <text x="55" y="53" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">outb(0x3F8, 'H')</text>

  <!-- Arrow 1 -->
  <line x1="105" y1="40" x2="135" y2="40" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="120" y="30" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">I/O port</text>

  <!-- UART -->
  <rect x="143" y="15" width="140" height="50" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="213" y="37" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">UART 16550A</text>
  <text x="213" y="53" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">COM1: 0x3F8</text>

  <!-- Arrow 2 -->
  <line x1="283" y1="40" x2="313" y2="40" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="298" y="30" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">serial</text>

  <!-- Serial Line -->
  <rect x="321" y="15" width="100" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="371" y="45" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">Serial Line</text>

  <!-- Arrow 3 -->
  <line x1="421" y1="40" x2="451" y2="40" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Terminal -->
  <rect x="459" y="15" width="85" height="50" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="501" y="45" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">Terminal</text>
</svg>
