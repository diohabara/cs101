<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 450 200" width="450" height="200"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Slot 0 -->
  <rect x="60" y="60" width="80" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="100" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold">3</text>
  <text x="100" y="55" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">slot 0</text>

  <!-- Slot 1 -->
  <rect x="145" y="60" width="80" height="50" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="185" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold">4</text>
  <text x="185" y="55" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">slot 1</text>

  <!-- Slot 2 (empty) -->
  <rect x="230" y="60" width="80" height="50" rx="4" ry="4"
        fill="none" stroke="#5a6a7a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="270" y="90" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">empty</text>
  <text x="270" y="55" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">slot 2</text>

  <!-- Slot 3 (empty) -->
  <rect x="315" y="60" width="80" height="50" rx="4" ry="4"
        fill="none" stroke="#5a6a7a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="355" y="90" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">empty</text>
  <text x="355" y="55" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">slot 3</text>

  <!-- tail pointer -->
  <text x="100" y="25" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">tail</text>
  <line x1="100" y1="30" x2="100" y2="56" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- head pointer -->
  <text x="270" y="25" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">head</text>
  <line x1="270" y1="30" x2="270" y2="56" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Wrap-around arrow -->
  <path d="M 395,85 C 420,85 430,140 395,140 L 60,140 C 30,140 25,85 60,85"
        fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arrowhead)"/>

  <!-- Wrap-around label -->
  <rect x="120" y="150" width="220" height="30" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1"/>
  <text x="230" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">wrap-around: head が末尾を超えると先頭に戻る</text>
</svg>
