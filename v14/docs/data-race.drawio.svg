<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 500 180" width="500" height="180"
     style="background: transparent;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Thread A box -->
  <rect x="10" y="10" width="120" height="40" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="70" y="35" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">Thread A</text>

  <!-- Shared counter box -->
  <rect x="190" y="10" width="120" height="40" rx="4" ry="4"
        fill="#d2e3fc" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="250" y="35" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">cnt: 5</text>

  <!-- Thread B box -->
  <rect x="370" y="10" width="120" height="40" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="430" y="35" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">Thread B</text>

  <!-- Step 1: both read cnt=5 -->
  <text x="70" y="75" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">read(cnt=5)</text>
  <line x1="130" y1="72" x2="188" y2="72" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="430" y="75" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">read(cnt=5)</text>
  <line x1="370" y1="72" x2="312" y2="72" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 2: both compute cnt+1=6 -->
  <text x="70" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">cnt+1=6</text>
  <line x1="130" y1="97" x2="188" y2="97" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="430" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">cnt+1=6</text>
  <line x1="370" y1="97" x2="312" y2="97" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Result box -->
  <rect x="155" y="90" width="190" height="30" rx="4" ry="4"
        fill="none" stroke="#5a6a7a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="250" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">cnt: 6 (LOST!)</text>

  <!-- Expected vs Got -->
  <rect x="115" y="135" width="270" height="35" rx="4" ry="4"
        fill="#e8f0fe" stroke="#5a6a7a" stroke-width="1.5"/>
  <text x="250" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">Expected: 7</text>
  <text x="250" y="163" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c0392b" font-weight="bold">Got: 6 (update lost)</text>
</svg>
